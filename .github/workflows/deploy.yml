name: Deploy to VPS

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to Aliyun ACR
        uses: docker/login-action@v3
        with:
          registry: crpi-dj1plh5tmmlskal3.cn-hangzhou.personal.cr.aliyuncs.com
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: crpi-dj1plh5tmmlskal3.cn-hangzhou.personal.cr.aliyuncs.com/studio1111/huobao-drama:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            GO_PROXY=https://goproxy.cn,direct
            VITE_STUDIO_ORIGIN=${{ secrets.VITE_STUDIO_ORIGIN }}

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
          script: |
            cd /root/data/disk/drama
            docker login crpi-dj1plh5tmmlskal3.cn-hangzhou.personal.cr.aliyuncs.com -u ${{ secrets.ACR_USERNAME }} -p ${{ secrets.ACR_PASSWORD }}
            docker compose pull drama
            docker compose up -d --force-recreate --no-deps drama
            docker image prune -f --filter "until=72h"
            echo "Waiting for drama to be healthy..."
            for i in $(seq 1 12); do
              STATUS=$(docker inspect --format='{{.State.Status}}' huobao-drama 2>/dev/null || echo "unknown")
              if [ "$STATUS" = "running" ]; then
                echo "Container is running."
                exit 0
              fi
              echo "Attempt $i: status=$STATUS, retrying in 5s..."
              sleep 5
            done
            echo "ERROR: Container failed to start"
            docker logs --tail=30 huobao-drama
            exit 1
