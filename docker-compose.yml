services:
  drama:
    image: crpi-dj1plh5tmmlskal3.cn-hangzhou.personal.cr.aliyuncs.com/studio1111/huobao-drama:latest
    container_name: huobao-drama
    build:
      context: .
      dockerfile: Dockerfile
      args:
        DOCKER_REGISTRY: ${DOCKER_REGISTRY:-}
        NPM_REGISTRY: ${NPM_REGISTRY:-}
        ALPINE_MIRROR: ${ALPINE_MIRROR:-}
    ports:
      - "127.0.0.1:5678:5678"
    volumes:
      - huobao-data:/app/data
    env_file: .env.production
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5678/api/v1/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - huobao-network

volumes:
  huobao-data:
    driver: local

networks:
  huobao-network:
    driver: bridge
